name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - uses: extractions/setup-just@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          git clone --depth 1 https://github.com/mizchi/syntree.mbt.git ../syntree.mbt
          git clone --depth 1 https://github.com/kawaz/markdown.mbt.git ../markdown.mbt
          (cd ../markdown.mbt && moon update)
          moon update

      - name: Run tests
        run: moon test --target js

      - name: Build
        run: just build

      - name: Verify CLI works
        run: |
          echo "# Test" | node bin/mdp.js
          # Unknown option should fail with exit code 1
          node bin/mdp.js --bad-option 2>/dev/null && exit 1 || test $? -eq 1
          # -- separator should work
          echo "# Dash" > /tmp/-dash-file.md
          node bin/mdp.js -- /tmp/-dash-file.md | grep -q Dash
          # Multiple files with error should still process valid files
          echo "# A" > /tmp/a.md
          output=$(node bin/mdp.js /tmp/a.md /tmp/nonexistent-xyz.md 2>/dev/null || true)
          echo "$output" | grep -q A
