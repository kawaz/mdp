name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone forked markdown.mbt
        run: git clone --depth 1 https://github.com/kawaz/markdown.mbt.git ../markdown.mbt

      - name: Install dependencies
        run: |
          moon update
          mkdir -p .mooncakes/mizchi
          ln -s "$(realpath ../markdown.mbt)" .mooncakes/mizchi/markdown

      - name: Run tests
        run: moon test --target js

      - name: Build
        run: |
          moon build --target js
          bun build _build/js/release/build/src/src.js --outfile=dist/mdp.js --minify --target=node

      - name: Verify CLI works
        run: |
          echo "# Test" | node bin/mdp.js
