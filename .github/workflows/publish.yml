name: Publish

on:
  push:
    branches: [main]
    paths:
      - "package.json"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - uses: extractions/setup-just@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          git clone --depth 1 https://github.com/mizchi/syntree.mbt.git ../syntree.mbt
          git clone --depth 1 https://github.com/kawaz/markdown.mbt.git ../markdown.mbt
          (cd ../markdown.mbt && moon update)
          moon update

      - name: Run tests
        run: moon test --target js

      - name: Build
        run: just build

      - name: Check version change
        id: version
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          NPM_VERSION=$(npm view @kawaz/mdp version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from $NPM_VERSION to $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT_VERSION"
          fi
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        if: steps.version.outputs.changed == 'true'
        with:
          name: dist
          path: dist/

  npm-publish:
    needs: build
    if: needs.build.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to npm
        run: npm publish --access public --provenance --ignore-scripts

  github-release:
    needs: [build, npm-publish]
    if: needs.build.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cp dist/mdp.bundle.js "dist/mdp-${VERSION}"
          gh release create "v${VERSION}" \
            "dist/mdp-${VERSION}" \
            --title "v${VERSION}" \
            --target "$COMMIT_SHA" \
            --generate-notes
